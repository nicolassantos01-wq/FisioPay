<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Exercícios para Idosas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #FFF5F7 0%, #F0E6FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .logo {
            font-size: 14px;
            font-weight: 500;
            color: #888;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            color: #222;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .header p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
        }

        .quiz-card {
            background: white;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.6s ease-out;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #D85A30, #D4537E);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .question-section {
            min-height: 280px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 500;
            color: #222;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            color: #333;
            text-align: left;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .option:hover {
            border-color: #D85A30;
            background: rgba(216, 90, 48, 0.03);
            transform: translateX(4px);
        }

        .option.selected {
            border-color: #D85A30;
            background: rgba(216, 90, 48, 0.1);
            color: #D85A30;
            font-weight: 500;
        }

        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: #D85A30;
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.3s ease;
        }

        .option.selected::before {
            transform: scaleY(1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            justify-content: space-between;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: 1.5px solid #D85A30;
            background: white;
            color: #D85A30;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            font-family: inherit;
        }

        button.next {
            background: linear-gradient(135deg, #D85A30, #D4537E);
            color: white;
            border: none;
        }

        button.next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(216, 90, 48, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .hidden {
            display: none;
        }

        .result-section {
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        .result-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 24px;
            font-weight: 600;
            color: #222;
            margin-bottom: 16px;
        }

        .result-message {
            font-size: 15px;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .cta-button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #D85A30, #D4537E);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(216, 90, 48, 0.35);
        }

        .sub-text {
            margin-top: 16px;
            font-size: 13px;
            color: #999;
        }

        .icon-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: rgba(216, 90, 48, 0.1);
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 24px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Bem-vinda!</div>
            <h1>Descubra os Melhores Exercícios para Você</h1>
            <p>Responda 5 perguntas rápidas e receba um plano personalizado de pilates e exercícios para fazer em casa</p>
        </div>

        <div class="quiz-card">
            <!-- Quiz Section -->
            <div id="quizSection">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="question-section">
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                </div>

                <div class="button-group">
                    <button id="prevBtn" onclick="previousQuestion()" style="visibility: hidden;">← Anterior</button>
                    <button class="next" id="nextBtn" onclick="nextQuestion()" disabled>Próxima →</button>
                </div>
            </div>

            <!-- Result Section -->
            <div id="resultSection" class="result-section hidden">
                <div class="icon-badge">🎉</div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-message" id="resultMessage"></div>
                <button class="cta-button" onclick="irParaKiwify()">Obtenha seu Ebook de Exercícios →</button>
                <div class="sub-text">Plano personalizado baseado em suas respostas</div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "Qual é sua idade?",
                options: ["Menos de 60 anos", "60-70 anos", "71-80 anos", "Mais de 80 anos"]
            },
            {
                question: "Você já pratica algum tipo de exercício?",
                options: ["Nunca pratiquei", "Raramente pratico", "Pratico 1-2x por semana", "Pratico mais de 3x por semana"]
            },
            {
                question: "Quais são suas principais limitações?",
                options: ["Nenhuma", "Dores nas costas", "Problemas de joelho/quadril", "Múltiplas limitações"]
            },
            {
                question: "Quanto tempo você pode dedicar aos exercícios?",
                options: ["Até 15 minutos", "15-30 minutos", "30-45 minutos", "Mais de 45 minutos"]
            },
            {
                question: "Qual é seu principal objetivo?",
                options: ["Melhorar flexibilidade", "Fortalecer músculos", "Aumentar equilíbrio", "Todos os anteriores"]
            }
        ];

        const resultTexts = {
            "Menos de 60 anos": "Exercícios Avançados",
            "60-70 anos": "Exercícios Moderados",
            "71-80 anos": "Exercícios Adapatados",
            "Mais de 80 anos": "Exercícios Gentis"
        };

        let currentQuestion = 0;
        let selectedAnswers = [null, null, null, null, null];

        function updateQuestion() {
            const question = questions[currentQuestion];
            document.getElementById("questionText").textContent = question.question;

            const optionsContainer = document.getElementById("optionsContainer");
            optionsContainer.innerHTML = "";

            question.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.textContent = option;
                button.className = "option";
                if (selectedAnswers[currentQuestion] === index) {
                    button.classList.add("selected");
                }
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            updateProgress();
            updateButtons();
        }

        function selectOption(index) {
            selectedAnswers[currentQuestion] = index;
            updateQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                updateQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                updateQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";
        }

        function updateButtons() {
            const nextBtn = document.getElementById("nextBtn");
            const prevBtn = document.getElementById("prevBtn");

            nextBtn.disabled = selectedAnswers[currentQuestion] === null;
            nextBtn.textContent = currentQuestion === questions.length - 1 ? "Ver Resultados →" : "Próxima →";

            if (currentQuestion > 0) {
                prevBtn.style.visibility = "visible";
            } else {
                prevBtn.style.visibility = "hidden";
            }
        }

        function showResults() {
            const ageAnswer = questions[0].options[selectedAnswers[0]];
            const resultType = resultTexts[ageAnswer];
            
            let message = "";
            const objective = questions[4].options[selectedAnswers[4]];
            
            message = "Baseado em suas respostas, montamos um plano especial com ênfase em " + objective.toLowerCase() + ". ";
            message += "Nosso ebook inclui exercícios de pilates e alongamentos seguros para sua faixa etária, com progressão gradual e adaptações conforme necessário.";

            document.getElementById("resultTitle").textContent = resultType + " para Você!";
            document.getElementById("resultMessage").textContent = message;

            document.getElementById("quizSection").classList.add("hidden");
            document.getElementById("resultSection").classList.remove("hidden");
        }

        function irParaKiwify() {
            // SUBSTITUA ESTE URL PELO LINK DO SEU EBOOK NO KIWIFY
            window.open("https://pay.kiwify.com.br/s4yPcbK?afid=vCq4UuL3", "_blank");
        }

        // Initialize
        updateQuestion();
    </script>
</body>
</html>
